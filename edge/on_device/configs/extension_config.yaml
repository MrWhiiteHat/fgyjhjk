app_name: RealFakeExtension
app_version: 1.0.0
model_name: real_fake_detector
model_version: v1.0.0
inference_mode: backend_preferred
fallback_backend_enabled: true
backend_base_url: http://127.0.0.1:8000
default_threshold: 0.5
local_model_path: edge/browser_extension/src/assets/models/real_fake_web.onnx
input_size: [224, 224]
normalization_mean: [0.485, 0.456, 0.406]
normalization_std: [0.229, 0.224, 0.225]
max_image_size_mb: 8
max_video_size_mb: 0
max_frames_per_video: 0
frame_stride: 0
aggregation_strategy: single_image
explainability_enabled: false
offline_history_enabled: true
offline_queue_enabled: true
sync_enabled: true
sync_interval_sec: 30
storage_quota_mb: 150
allowed_image_extensions: [".jpg", ".jpeg", ".png", ".webp", ".gif"]
allowed_video_extensions: []
extension_scan_limit: 40
extension_auto_scan_enabled: false
extension_overlay_enabled: true
mobile_camera_fps_cap: 0
low_power_mode: true
quantized_model_enabled: true
benchmark_enabled: false
debug_logging: false
privacy_mode: extension_minimum_retention
