apiVersion: v1
kind: Namespace
metadata:
  name: realfake-cloud-shared
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-backend-shared
  namespace: realfake-cloud-shared
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cloud-backend-shared
  template:
    metadata:
      labels:
        app: cloud-backend-shared
    spec:
      containers:
        - name: backend
          image: realfake/backend:cloud
          ports:
            - containerPort: 8000
          env:
            - name: CLOUD_STORAGE_ROOT
              value: /data/cloud/storage
            - name: CLOUD_JOB_POLL_INTERVAL_SECONDS
              value: "0.2"
