version: "3.9"

services:
  backend:
    build:
      context: ../..
      dockerfile: app/deployment/Dockerfile.backend
    container_name: realfake-backend
    env_file:
      - ../backend/.env.example
    environment:
      APP_ENV: production
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      METRICS_ENABLED: "true"
      PROMETHEUS_ENABLED: "true"
    volumes:
      - ../../training/outputs:/workspace/training/outputs:ro
      - ../../evaluation/outputs:/workspace/evaluation/outputs
      - ../../app/backend/outputs:/workspace/app/backend/outputs
      - ../../app/backend/tmp:/workspace/app/backend/tmp
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5).read(); print('ok')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - realfake-net

  frontend:
    build:
      context: ../..
      dockerfile: app/deployment/Dockerfile.frontend
    container_name: realfake-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - realfake-net

  nginx:
    image: nginx:1.27-alpine
    container_name: realfake-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - realfake-net

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: realfake-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/-/healthy > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - realfake-net

networks:
  realfake-net:
    driver: bridge
