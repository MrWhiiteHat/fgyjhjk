apiVersion: apps/v1
kind: Deployment
metadata:
  name: realfake-frontend
  namespace: realfake
spec:
  replicas: 1
  selector:
    matchLabels:
      app: realfake-frontend
  template:
    metadata:
      labels:
        app: realfake-frontend
    spec:
      containers:
        - name: frontend
          image: your-registry/realfake-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: realfake-config
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 8
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 12
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
