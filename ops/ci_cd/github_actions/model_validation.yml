name: model-validation

on:
  workflow_dispatch:
  push:
    paths:
      - 'training/outputs/**'
      - 'ops/mlops/**'
      - 'ops/drift/**'
      - 'ops/scripts/run_drift_check.py'
      - '.github/workflows/model_validation.yml'

jobs:
  validate-model:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f training/requirements.txt ]; then pip install -r training/requirements.txt; fi
          pip install pytest pyyaml

      - name: Run MLOps gate tests
        run: |
          pytest -q ops/tests/test_model_registry.py ops/tests/test_drift_monitor.py

      - name: Run drift check script
        run: |
          python ops/scripts/run_drift_check.py --config ops/configs/drift_config.yaml
