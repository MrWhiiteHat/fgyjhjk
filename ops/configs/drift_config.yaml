environment: production
service_name: realfake-face-detection
service_version: 1.0.0
model_name: real_fake_baseline
active_model_version: 1.0.0

drift_monitor_enabled: true
drift_check_interval_hours: 6
feature_drift_threshold: 0.2
prediction_drift_threshold: 0.15
reference_window_days: 30

reference_store_path: ops/drift/state/references
drift_history_path: app/backend/outputs/ops/drift/drift_history.jsonl
report_output_dir: app/backend/outputs/ops/drift/reports

feature_list:
  - brightness_score
  - blur_score
  - width
  - height
  - face_confidence
  - probability

min_samples_for_check: 100
max_histogram_bins: 20

alert_channels:
  - type: webhook
    target: https://alerts.example.com/realfake-drift
    severity_min: warning
