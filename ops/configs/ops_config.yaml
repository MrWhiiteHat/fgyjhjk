environment: production
service_name: realfake-face-detection
service_version: 1.0.0
model_name: real_fake_baseline
active_model_version: 1.0.0

prometheus_enabled: true
grafana_enabled: true
metrics_port: 9108
health_check_interval_sec: 60
latency_p95_threshold_ms: 300.0
latency_p99_threshold_ms: 600.0
error_rate_threshold: 0.05
throughput_min_threshold: 2.0

audit_logging_enabled: true
log_retention_days: 30
log_redaction_enabled: true

rate_limit_enabled: true
rate_limit_per_minute: 120
api_key_enabled: true
allowed_origins:
  - http://localhost:3000
  - https://realfake.example.com
max_upload_size_mb: 250

model_registry_path: ops/mlops/state/model_registry.json
artifact_store_path: ops/mlops/state/artifacts
model_validation_required: true
promotion_requires_approval: true
rollback_enabled: true

drift_monitor_enabled: true
drift_check_interval_hours: 6
feature_drift_threshold: 0.2
prediction_drift_threshold: 0.15
reference_window_days: 30

backup_enabled: true
backup_interval_hours: 24
backup_retention_days: 14

storage_budget_gb: 500
gpu_budget_hours: 120

alert_channels:
  - type: webhook
    target: https://alerts.example.com/realfake
    severity_min: warning
  - type: email
    target: mlops-oncall@example.com
    severity_min: critical

staging_deploy_enabled: true
production_deploy_enabled: true
